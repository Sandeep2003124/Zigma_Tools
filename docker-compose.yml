version: '3.9'

services:
  frontend:
    image: nginx:alpine
    container_name: zigma-frontend
    ports:
      - "80:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - zigma-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zigma-backend
    ports:
      - "3001:3001"               # optional – for direct access
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - zigma-net

networks:
  zigma-net:
    driver: bridge